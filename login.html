<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAA - Connexion</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    
    <div class="login-container">
        <!-- Background Effects -->
        <div class="bg-gradient"></div>
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>

        <!-- Login Card (Glassmorphism) -->
        <div class="glass-card">
            <div class="card-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>Smart Academic Assistant</h1>
                <p>Connectez-vous pour accéder à votre espace</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Adresse E-mail" required autocomplete="email">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Mot de passe" required autocomplete="current-password">
                    <button type="button" id="togglePassword" class="toggle-btn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn-login" id="submitBtn">
                    <span>Se Connecter</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="card-footer">
                <p>Comptes test :</p>
                <p> Admin : <strong>admin@saa.com</strong> / <strong>admin123</strong></p>
                <p> Enseignant : <strong>enseignant@saa.com</strong> / <strong>enseignant123</strong></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
</body>
</html>

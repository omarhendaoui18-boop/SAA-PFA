<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Matières - SAA</title>
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .eval-badge { background: rgba(108, 99, 255, 0.1); color: #6c63ff; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        /* --- STYLE TABLEAU PRO --- */
        .glass-table th, .glass-table td { padding: 18px 20px !important; text-align: left; border-bottom: 1px solid var(--glass-border); font-size: 14px !important; }
        .glass-table th { color: var(--text-secondary); font-weight: 500; font-size: 13px !important; text-transform: uppercase; letter-spacing: 0.5px; }
        .glass-table tr:hover td { background: rgba(255,255,255,0.02); }
        /* Pour mettre le coefficient dans une bulle violette */
        .coeff-badge { display: inline-block; background: rgba(108, 99, 255, 0.15); color: var(--accent-main); padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 13px; }
        .glass-table { width: 100% !important; table-layout: fixed !important; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-sidebar"><i class="fas fa-graduation-cap"></i><span>SAA Admin</span></div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-link"><i class="fas fa-chart-pie"></i> Tableau de bord</a>
            <a href="admin-gestion-etudiants.html" class="nav-link"><i class="fas fa-users"></i> Gestion Étudiants</a>
            <a href="admin-gestion-utilisateurs.html" class="nav-link"><i class="fas fa-user-shield"></i> Gestion Utilisateurs</a>
            <a href="admin-matieres.html" class="nav-link active"><i class="fas fa-book"></i> Matières</a>
        </nav>
        <div class="sidebar-footer"><a href="#" id="logoutBtn" class="nav-link logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="welcome-text"><h1>Liste des Matières 📚</h1><p>Matières enseignées et leurs barèmes d'évaluation.</p></div>
        </header>

        <div class="glass-card">
            <table class="glass-table">
                <thead>
                    <tr>
                        <th>Nom de la matière</th>
                        <th>Coefficient</th>
                        <th>Type d'évaluation</th>
                    </tr>
                </thead>
                <tbody id="matieresTableBody">
                    <tr><td colspan="3" style="text-align:center;color:var(--text-secondary)">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        if (!localStorage.getItem('saa_token') || localStorage.getItem('saa_role') !== 'admin') window.location.href = '/pages/login.html';
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); localStorage.clear(); window.location.href = '/pages/login.html'; });

        function formatType(type) {
            switch(type) {
                case 'DS_EXAM_30_70': return 'DS 30% - Examen 70%';
                case 'DS_TP_EXAM_15_15_70': return 'DS 15% - TP 15% - Examen 70%';
                case 'DS_EXAM_50_50': return 'DS 50% - Examen 50%';
                case 'PFA': return 'Projet PFA (100%)';
                default: return type;
            }
        }

        async function loadMatieres() {
            const res = await fetch('/api/matieres');
            const result = await res.json();
            const tbody = document.getElementById('matieresTableBody');
            
            if (result.success) {
                tbody.innerHTML = result.data.map(mat => `
                    <tr>
                        <td><strong>${mat.nom}</strong></td>
                        <td><span class="coeff-badge">${mat.coefficient}</span></td>
                        <td><span class="eval-badge"><i class="fas fa-percentage"></i> ${formatType(mat.type_evaluation)}</span></td>
                    </tr>
                `).join('');
            }
        }

        loadMatieres();
    </script>
</body>
</html>
